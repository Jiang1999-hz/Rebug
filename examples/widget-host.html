<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bug Widget Demo Host</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #faf4ec 0%, #efe5d7 100%);
        color: #1f2328;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 72px 24px 120px;
      }

      h1 {
        margin-bottom: 12px;
        font-size: clamp(2rem, 4vw, 3.6rem);
      }

      p {
        max-width: 62ch;
        line-height: 1.7;
      }

      .card {
        margin-top: 32px;
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 20px 40px rgba(40, 31, 18, 0.08);
      }

      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.06);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Widget 本地挂载示例页</h1>
      <p>
        这个页面用于验证嵌入式缺陷上报组件是否能在任意 HTML 站点里正常工作。
        启动 API 和 Widget 构建后，右下角会出现浮动按钮。
      </p>

      <section class="card">
        <p>默认示例使用本地 API 地址 <code>http://localhost:3000</code>。</p>
        <p>如果你已经完成数据库迁移和 seed，可以先把 <code>proj_demo_local</code> 拿来联调。</p>
      </section>
    </main>

    <script>
      window.BugWidget = {
        apiKey: 'proj_demo_local',
        apiBaseUrl: 'http://localhost:3000',
        position: 'bottom-right'
      };
    </script>
    <script src="http://localhost:3000/widget.js" async></script>
  </body>
  </html>
